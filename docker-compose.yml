version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ainews
      POSTGRES_PASSWORD: ainews123
      POSTGRES_DB: ainews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainews"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ainews:ainews123@db:5432/ainews
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
